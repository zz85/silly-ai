name: Release

on:
  push:
    tags:
      - "v*"

# Future targets (not yet implemented):
#
# - darwin-x86_64: Intel Mac builds
#     ort-sys does not provide prebuilt ONNX Runtime for x86_64-apple-darwin.
#     Options: compile ort from source (needs cmake, slow), or use ort/load-dynamic.
#     Intel Macs are EOL (2020); users can build from source.
#
# - linux-aarch64: ARM64 Linux builds
#
#   Option B: Use the `cross` tool (Docker-based cross-compilation with pre-built sysroots)
#     - Install: cargo install cross --git https://github.com/cross-rs/cross
#     - Build:   cross build --release --target aarch64-unknown-linux-gnu
#     - Handles sysroot, pkg-config, libasound2, and linker automatically via Docker
#     - Add to matrix:
#         - target: aarch64-unknown-linux-gnu
#           runner: ubuntu-latest
#           name: linux-aarch64
#           use_cross: true
#
#   Option C: Use GitHub ARM runners (native compilation, simplest)
#     - Runner: ubuntu-24.04-arm64 (currently in public beta, may require enrollment)
#     - Same steps as linux-x86_64, just different runner
#     - Add to matrix:
#         - target: aarch64-unknown-linux-gnu
#           runner: ubuntu-24.04-arm64
#           name: linux-aarch64
#           deps: libasound2-dev pkg-config
#
# Note on Linux static linking:
#   Full musl static binaries aren't practical because ort-sys ships glibc-linked
#   ONNX Runtime prebuilts and cpal requires libasound (ALSA). Instead we use
#   cargo-zigbuild to target glibc 2.17 (CentOS 7 era) for maximum portability.

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            name: darwin-aarch64

          - target: x86_64-unknown-linux-gnu.2.17
            runner: ubuntu-latest
            name: linux-x86_64
            deps: libasound2-dev pkg-config
            zigbuild: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'x86_64-unknown-linux-gnu.2.17' && 'x86_64-unknown-linux-gnu' || matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Install system dependencies
        if: matrix.deps
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build (zigbuild)
        if: matrix.zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          TARGET_DIR="${{ matrix.target }}"
          # zigbuild targets like x86_64-unknown-linux-gnu.2.17 output to the base triple dir
          TARGET_DIR="${TARGET_DIR%.2.17}"
          strip target/${TARGET_DIR}/release/silly

      - name: Package
        run: |
          TARGET_DIR="${{ matrix.target }}"
          TARGET_DIR="${TARGET_DIR%.2.17}"
          tar -czf silly-${{ matrix.name }}.tar.gz -C target/${TARGET_DIR}/release silly

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: silly-${{ matrix.name }}
          path: silly-${{ matrix.name }}.tar.gz

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            artifacts/silly-darwin-aarch64/silly-darwin-aarch64.tar.gz \
            artifacts/silly-linux-x86_64/silly-linux-x86_64.tar.gz
